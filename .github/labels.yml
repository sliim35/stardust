# Label taxonomy for the AI SDLC backlog (source of truth).
# Applied by scripts/sdlc/seed-backlog.sh via `gh label create`.
# Five namespaces: type / priority / status / role / area.

# --- type ---
- name: "type:epic"
  color: "5319e7"
  description: "A body of work grouping stories"
- name: "type:story"
  color: "1d76db"
  description: "A self-contained, shippable unit of work"
- name: "type:bug"
  color: "d73a4a"
  description: "Something doesn't work as expected"
- name: "type:spike"
  color: "0e8a16"
  description: "A time-boxed research question"

# --- priority ---
- name: "priority:P0"
  color: "b60205"
  description: "Drop everything"
- name: "priority:P1"
  color: "d93f0b"
  description: "High"
- name: "priority:P2"
  color: "fbca04"
  description: "Normal"
- name: "priority:P3"
  color: "c2e0c6"
  description: "Low / someday"

# --- status (done = issue closed) ---
- name: "status:todo"
  color: "ededed"
  description: "Not started"
- name: "status:in-progress"
  color: "0052cc"
  description: "Being implemented"
- name: "status:in-review"
  color: "fef2c0"
  description: "Awaiting QA"
- name: "status:blocked"
  color: "000000"
  description: "Blocked on something"

# --- role (which SDLC agent owns it) ---
- name: "role:research"
  color: "bfd4f2"
  description: "researcher"
- name: "role:architecture"
  color: "d4c5f9"
  description: "architect"
- name: "role:design"
  color: "f9d0c4"
  description: "ui-designer"
- name: "role:dev"
  color: "c5def5"
  description: "developer"
- name: "role:qa"
  color: "bfdadc"
  description: "qa"
- name: "role:devops"
  color: "c2e0c6"
  description: "devops"

# --- area (product/ops area; ~maps to an epic) ---
- name: "area:galaxy"
  color: "1d76db"
  description: "Epic · Explorable Galaxy (frontend)"
- name: "area:ingestion"
  color: "0e8a16"
  description: "Epic · Memory Ingestion"
- name: "area:agent"
  color: "5319e7"
  description: "Epic · AI Placement Agent"
- name: "area:live"
  color: "fbca04"
  description: "Epic · Shared Live Sky"
- name: "area:ops"
  color: "8a63d2"
  description: "Epic · Platform & Delivery (CI/CD, infra, ops)"
