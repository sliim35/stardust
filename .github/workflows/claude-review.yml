name: Claude Auto Review

# Auto-reviews every pull request with Claude Code (anthropics/claude-code-action),
# running on the owner's Claude *subscription* via CLAUDE_CODE_OAUTH_TOKEN — NOT the
# pay-as-you-go ANTHROPIC_API_KEY. One-time setup: add CLAUDE_CODE_OAUTH_TOKEN as a
# repository secret (Settings -> Secrets and variables -> Actions). Story: #195.
#
# This is an additive, fast first-pass CI gate. It echoes the in-repo `reviewer` agent
# (md-review-pr) conventions; it does NOT replace it — the full reviewer loop still owns
# anything nuanced or convention-growing.

on:
  pull_request:
    types: [opened, synchronize]

# Supersede an in-flight review when the PR gets new commits.
concurrency:
  group: claude-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post inline review comments
      id-token: write # OIDC token the action needs to authenticate
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so the PR diff resolves cleanly

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Our SDLC opens every PR as the dev bot, which claude-code-action blocks by
          # default ("Workflow initiated by non-human actor"). Allowlist exactly that bot.
          # NOT "*": on a public repo "*" would let external Apps invoke the action.
          allowed_bots: "reviewer-stardust-project[bot]"
          prompt: |
            You are the `reviewer` agent for this repo (stardust / Memory Galaxy). An additive
            first-pass CI gate; the in-repo `reviewer` (md-review-pr) owns anything nuanced.

            ## Review ONLY what changed in THIS round — not the whole PR
            - On `synchronize`: review only the new commits' diff —
              `git diff ${{ github.event.before }} ${{ github.event.pull_request.head.sha }}`.
            - On `opened`: review the full PR diff vs the base branch.
            - Do NOT re-read or re-review files unchanged in this round.

            ## Carry context between rounds — never re-litigate
            - FIRST read the PR's existing review threads (resolved AND open) and their replies
              via `gh api` (reviewThreads GraphQL, or pulls/<n>/comments).
            - Do NOT raise any point already raised in a prior round (resolved or open).
            - HONOR prior `reviewer-stardust-project[bot]` replies: if a nit was rejected there
              (e.g. "not codified"), do NOT raise it again.

            ## What to flag
            1. Correctness bugs / edge cases.
            2. Security issues.
            3. Reuse / simplification / efficiency.
            4. Convention violations — ONLY rules explicitly codified in
               docs/conventions/code-style.md or AGENTS.md § Conventions (read them first).
               Do NOT apply general best-practices, personal style preferences, or
               comment-formatting opinions NOT recorded in those files. If unsure whether
               something is codified, do NOT flag it.

            Be concise. Skip praise. Post findings as inline review comments on the changed
            lines. If this round's changes need nothing, post a single one-line "LGTM".
          # --model sonnet keeps routine reviews cheap; switch the line below to
          # --model opus for deeper reasoning on complex or critical PRs.
          claude_args: |
            --model sonnet
            --allowedTools "Read,Bash(git:*),Bash(gh:*)"
