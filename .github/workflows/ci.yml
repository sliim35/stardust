name: CI

on:
  pull_request:
  push:
    branches: [main]

# Supersede in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    # This job's name is the required status-check context in the "Protected main"
    # ruleset — keep it stable even when adding steps (typecheck, etc.), or PRs that
    # rename it can never satisfy the rule and merges silently block. (#66)
    name: check · test · build
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
