name: Deploy

on:
  push:
    branches: [main]

# Never cancel an in-flight production deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: build · deploy (Cloudflare Workers)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # The ONLY GitHub secret is OP_SERVICE_ACCOUNT_TOKEN; every real secret is
      # pulled from 1Password at runtime via op:// references (ADR-0004).
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: op://Integrations/Cloudflare/password
          CLOUDFLARE_ACCOUNT_ID: op://Integrations/Cloudflare/username

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: deploy
